<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Fikya.id</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { font-size: 1.5rem; color: #333; }
        .comment-card { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .btn { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; color: white; font-size: 0.8rem; }
        .btn-approve { background: #28a745; }
        .btn-delete { background: #dc3545; }
        .loading { text-align: center; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>Moderasi Komentar</h1>
    <div id="comment-list">
        <p class="loading">Memuat komentar...</p>
    </div>
</div>

<script>
    // --- KONFIGURASI ---
    const SCRIPT_URL = 'URL_WEB_APP_APPS_SCRIPT_ANDA_DISINI';
    
    // Fungsi untuk menarik data komentar yang pending
    async function loadComments() {
        const list = document.getElementById('comment-list');
        // Kita gunakan JSONP agar bisa melewati batasan CORS
        const script = document.createElement('script');
        script.src = `${SCRIPT_URL}?action=getComments&postId=semua&callback=renderComments`;
        document.body.appendChild(script);
    }

    // Callback untuk render daftar komentar
    function renderComments(response) {
        const list = document.getElementById('comment-list');
        list.innerHTML = '';
        
        if (response.status !== 'ok' || response.comments.length === 0) {
            list.innerHTML = '<p>Tidak ada komentar baru.</p>';
            return;
        }

        response.comments.forEach(c => {
            const div = document.createElement('div');
            div.className = 'comment-card';
            div.id = `row-${c.timestamp.replace(/[: ]/g, '')}`;
            div.innerHTML = `
                <div>
                    <strong>${c.nama}</strong><br>
                    <small>${c.timestamp}</small><br>
                    <p>${c.komentar}</p>
                </div>
                <div>
                    <button class="btn btn-approve" onclick="updateStatus('${c.timestamp}', 'approved')">Approve</button>
                    <button class="btn btn-delete" onclick="updateStatus('${c.timestamp}', 'deleted')">Hapus</button>
                </div>
            `;
            list.appendChild(div);
        });
    }

    // Fungsi update status (Optimistic UI)
    async function updateStatus(timestamp, status) {
        // Optimistic: Hapus elemen dari UI dulu
        const rowId = `row-${timestamp.replace(/[: ]/g, '')}`;
        document.getElementById(rowId).style.display = 'none';

        const formData = new URLSearchParams();
        formData.append('action', 'updateStatus');
        formData.append('timestamp', timestamp);
        formData.append('status', status);

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            });
            console.log('Update berhasil dikirim');
        } catch (err) {
            alert('Gagal update. Periksa koneksi.');
            document.getElementById(rowId).style.display = 'flex';
        }
    }

    loadComments();
</script>
</body>
</html>
